<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <table >
        <tr>
            <td colspan="4"><input class="inputStyle" type="text"></td>

        </tr>
        <tr>
            <td><button class="lightButton">AC</button></td>
            <td><button class="lightButton">+/-</button></td>
            <td><button class="lightButton">%</button></td>
            <td><button class="accentButton">&divide;</button></td>
        </tr>
        <tr>
            <td><button class="darkButton">7</button></td>
            <td><button class="darkButton">8</button></td>
            <td><button class="darkButton">9</button></td>
            <td><button class="accentButton">X</button></td>
        </tr>
        <tr>
            <td><button class="darkButton">4</button></td>
            <td><button class="darkButton">5</button></td>
            <td><button class="darkButton">6</button></td>
            <td><button class="accentButton">-</button></td>
        </tr>
        <tr>
            <td><button class="darkButton">1</button></td>
            <td><button class="darkButton">2</button></td>
            <td><button class="darkButton">3</button></td>
            <td><button class="accentButton">+</button></td>
        </tr>
        <tr>
            <td colspan="2" ><button class="ceroButton darkButton">0</Button></td>
            <td><button class="darkButton">.</Button></td>
            <td><button class="accentButton">=</Button></td>
        </tr>
        <tr>
            <td><button class="accentButton">X²</button></td>
            <td><button class="accentButton">X³</button></td>
            <td><button class="accentButton">PI</button></td>
            <td><button class="accentButton">&radic;</button></td>
        </tr>
    </table>
</body>

</html>
